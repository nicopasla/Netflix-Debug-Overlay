name: Bug Report
description: Something not working or a field not displaying correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what is wrong.
    validations:
      required: true

  - type: textarea
    id: debug_dump
    attributes:
      label: Debug dump
      description: |
        Click **copy** in the overlay, or open the Netflix debug menu with
        `Ctrl + Shift + Alt + D`, then copy the entire text.      render: text
      placeholder: (paste here)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: e.g. Chrome 146, Edge 146, Firefox 125
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, macOS 14
    validations:
      required: true

  - type: dropdown
    id: userscript_manager
    attributes:
      label: Userscript manager
      options:
        - Tampermonkey
        - Violentmonkey
        - Greasemonkey
        - Other
    validations:
      required: true

  - type: input
    id: script_version
    attributes:
      label: Script version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to see.
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: If applicable, add a screenshot of the overlay.
    validations:
      required: false